# Deploy no Fly.io — region GRU (São Paulo)
# Custo estimado: $0-3/mês com tráfego leve
# Comandos:
#   flyctl auth login
#   flyctl launch --no-deploy --copy-config --name brincandocomfe-card
#   flyctl secrets set CARD_TOKEN="$(openssl rand -hex 24)"
#   flyctl deploy

app = "brincandocomfe-card"
primary_region = "gru"           # São Paulo
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ALLOWED_ORIGIN = "https://brincandocomfe.com.br"
  WEBHOOK_URL = "https://automatico.projeto.tecnoatende.com.br/webhook/reinokids-card-img2img"
  # CARD_TOKEN é setado via `flyctl secrets set`

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # economia: para a máquina quando ocioso
  auto_start_machines = true       # liga em ~3s no primeiro request
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"                 # Pillow funciona com 256MB; pode subir pra 512mb se gerar muitas em paralelo

[[restart]]
  policy = "always"
